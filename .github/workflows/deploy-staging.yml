name: Deploy to Staging

# On push to `staging`: run the full test gate, then (only if green) apply
# migrations + deploy edge functions + kick off an EAS staging build, and post a
# summary to Slack. On any failure, Slack gets an alert with a link to the run.
#
# Staging is fully isolated from prod, so there is no approval gate.
# Steps degrade gracefully: EAS / Slack steps no-op until EXPO_TOKEN /
# SLACK_WEBHOOK_URL are set, so the DB+functions deploy works incrementally.

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # Gate: reuse the PR test workflow. secrets: inherit passes the staging secrets
  # through to its integration job.
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  deploy:
    name: Migrations + edge functions + EAS (staging)
    needs: [test]
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
      STAGING_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      # App Store Connect API key (.p8, base64) used to auto-submit the staging
      # build to TestFlight. The .p8 is gitignored, so CI reconstructs it from
      # this secret. When unset, the build still runs but submit is skipped.
      ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Pinned (not "latest") — resolving "latest" hits the GitHub API and
          # gets rate-limited on shared runners. Bump deliberately.
          version: 2.76.9

      - name: Link staging project
        run: supabase link --project-ref "$STAGING_REF"

      - name: Apply pending migrations
        run: supabase db push

      - name: Deploy edge functions
        # `supabase functions deploy` bundles every function and fetches remote
        # esm.sh imports while doing so. esm.sh (Cloudflare) intermittently
        # returns 522/timeout mid-bundle, which fails the whole (non-atomic)
        # deploy after some functions already shipped. Retry up to 3× — re-runs
        # are cheap and idempotent ("No change found" skips unchanged functions).
        run: |
          for attempt in 1 2 3; do
            echo "::group::functions deploy attempt $attempt"
            if supabase functions deploy --project-ref "$STAGING_REF"; then
              echo "::endgroup::"; exit 0
            fi
            echo "::endgroup::"
            echo "::warning::functions deploy attempt $attempt failed (likely transient esm.sh); retrying…"
            sleep 15
          done
          echo "::error::functions deploy failed after 3 attempts"; exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (EAS needs node_modules to resolve config plugins)
        if: ${{ env.EXPO_TOKEN != '' }}
        run: npm ci

      # Reconstruct the App Store Connect API key (.p8) from the base64 secret so
      # `eas build --auto-submit` can hand it to EAS for the server-side TestFlight
      # submission. eas.json's submit.staging.ios.ascApiKeyPath points here.
      - name: Materialize App Store Connect API key
        if: ${{ env.EXPO_TOKEN != '' && env.ASC_API_KEY_P8_BASE64 != '' }}
        run: |
          mkdir -p secrets
          printf '%s' "$ASC_API_KEY_P8_BASE64" | base64 -d > secrets/asc-api-key.p8
          echo "wrote secrets/asc-api-key.p8 ($(wc -c < secrets/asc-api-key.p8) bytes)"

      # With the ASC key present: build + auto-submit to TestFlight (server-side,
      # so --no-wait is fine — EAS runs the submit after the build completes).
      - name: Trigger EAS staging build + TestFlight submit
        if: ${{ env.EXPO_TOKEN != '' && env.ASC_API_KEY_P8_BASE64 != '' }}
        run: npx eas-cli@latest build --platform ios --profile staging --auto-submit --non-interactive --no-wait

      # Fallback: ASC key not configured — build only (old behavior).
      - name: Trigger EAS staging build (build only — no ASC key)
        if: ${{ env.EXPO_TOKEN != '' && env.ASC_API_KEY_P8_BASE64 == '' }}
        run: npx eas-cli@latest build --platform ios --profile staging --non-interactive --no-wait

      - name: Skip EAS (no token)
        if: ${{ env.EXPO_TOKEN == '' }}
        run: echo "::warning::EXPO_TOKEN not set — skipped EAS staging build."

      - name: Slack — deploy succeeded
        if: ${{ success() && env.SLACK_WEBHOOK_URL != '' }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -X POST -H 'Content-Type: application/json' "$SLACK_WEBHOOK_URL" -d @- <<JSON
          {"text":":rocket: *Staging deploy succeeded*","attachments":[{"color":"#36a64f","blocks":[
            {"type":"section","fields":[
              {"type":"mrkdwn","text":"*Env:*\nstaging"},
              {"type":"mrkdwn","text":"*Commit:*\n\`${{ github.sha }}\`"},
              {"type":"mrkdwn","text":"*By:*\n${{ github.actor }}"},
              {"type":"mrkdwn","text":"*Shipped:*\nmigrations + edge functions + EAS"}
            ]},
            {"type":"actions","elements":[{"type":"button","text":{"type":"plain_text","text":"View run"},"url":"$RUN_URL"}]}
          ]}]}
          JSON

  notify-failure:
    name: Slack on failure
    needs: [test, deploy]
    if: ${{ always() && (needs.test.result == 'failure' || needs.deploy.result == 'failure') }}
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_ALERT_MENTION: ${{ secrets.SLACK_ALERT_MENTION }}
    steps:
      - name: Slack — deploy failed
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STAGE="${{ needs.test.result == 'failure' && 'tests' || 'deploy' }}"
          curl -sf -X POST -H 'Content-Type: application/json' "$SLACK_WEBHOOK_URL" -d @- <<JSON
          {"text":":x: *Staging deploy FAILED* at ${STAGE} ${SLACK_ALERT_MENTION}","attachments":[{"color":"#cc0000","blocks":[
            {"type":"section","fields":[
              {"type":"mrkdwn","text":"*Env:*\nstaging"},
              {"type":"mrkdwn","text":"*Failed at:*\n${STAGE}"},
              {"type":"mrkdwn","text":"*Commit:*\n\`${{ github.sha }}\`"}
            ]},
            {"type":"section","text":{"type":"mrkdwn","text":"Migrations are not auto-rolled-back (forward-fix policy). See the rollback runbook in docs/chief_engineer/deployment.md."}},
            {"type":"actions","elements":[{"type":"button","text":{"type":"plain_text","text":"View logs"},"url":"$RUN_URL"}]}
          ]}]}
          JSON
