name: Deploy to Staging

# Auto-deploys DB migrations + edge functions to the staging Supabase project
# on every push to the `staging` branch. Staging is fully isolated from prod,
# so this needs no approval gate.
#
# Inert until these repo secrets are set:
#   SUPABASE_ACCESS_TOKEN          - Supabase personal access token (CI)
#   SUPABASE_STAGING_PROJECT_REF   - staging project ref (e.g. abcdwxyz...)
#   SUPABASE_STAGING_DB_PASSWORD   - staging database password

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  guard:
    name: Check secrets configured
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -n "$REF" ] && [ -n "$TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Staging deploy skipped — set SUPABASE_ACCESS_TOKEN and SUPABASE_STAGING_PROJECT_REF (and SUPABASE_STAGING_DB_PASSWORD)."
          fi

  deploy:
    name: Deploy migrations + edge functions
    needs: [guard]
    if: needs.guard.outputs.configured == 'true'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      STAGING_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link staging project
        run: supabase link --project-ref "$STAGING_REF"
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "$STAGING_REF"
