name: Deploy to Production

# Deploys DB migrations + edge functions to the production Supabase project.
# Triggered on push to `main`; the deploy job runs in the `Production` GitHub
# Environment, which has Kevin as a required reviewer — so prod deploys pause
# for human approval. Also runnable manually via workflow_dispatch.
#
# Inert until these repo secrets are set:
#   SUPABASE_ACCESS_TOKEN       - Supabase personal access token (CI)
#   SUPABASE_PROD_PROJECT_REF   - production project ref (lkmntknpaiaiqvupzjbz)
#   SUPABASE_PROD_DB_PASSWORD   - production database password

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  guard:
    name: Check secrets configured
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -n "$REF" ] && [ -n "$TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Production deploy skipped — set SUPABASE_ACCESS_TOKEN and SUPABASE_PROD_PROJECT_REF (and SUPABASE_PROD_DB_PASSWORD)."
          fi

  deploy:
    name: Deploy migrations + edge functions
    needs: [guard]
    if: needs.guard.outputs.configured == 'true'
    runs-on: ubuntu-latest
    # Approval gate: the `Production` environment requires Kevin as reviewer.
    environment: Production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROD_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$PROD_REF"
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}

      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "$PROD_REF"
