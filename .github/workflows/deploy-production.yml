name: Deploy to Production

# On push to `main`: run the full test gate, then deploy to PRODUCTION behind a
# manual approval gate (the `Production` GitHub Environment with Kevin as a
# required reviewer — this is the "ask before first prod deploy" control).
# Deploy = migrations + edge functions + EAS production build, then a release tag
# and a Slack summary. Failures alert Slack with a link to the run.
#
# Required reviewer setup (one-time): Settings → Environments → Production →
# "Required reviewers" → add yourself. Until then the deploy job auto-proceeds.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  deploy:
    name: Migrations + edge functions + EAS (production)
    needs: [test]
    runs-on: ubuntu-latest
    # Approval gate — pauses for the Production environment's required reviewer.
    environment: Production
    permissions:
      contents: write   # needed to push the release tag
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
      PROD_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so the release tag is unambiguous

      - uses: supabase/setup-cli@v1
        with:
          # Pinned (not "latest") — resolving "latest" hits the GitHub API and
          # gets rate-limited on shared runners. Bump deliberately.
          version: 2.76.9

      - name: Link production project
        run: supabase link --project-ref "$PROD_REF"

      - name: Apply pending migrations
        run: supabase db push

      - name: Deploy edge functions
        # Retry up to 3× — `supabase functions deploy` fetches remote esm.sh
        # imports while bundling and esm.sh (Cloudflare) intermittently returns
        # 522/timeout, failing the non-atomic deploy mid-flight. Re-runs are
        # idempotent ("No change found" skips unchanged functions). See the
        # staging workflow for the same guard and docs/chief_engineer/deployment.md.
        run: |
          for attempt in 1 2 3; do
            echo "::group::functions deploy attempt $attempt"
            if supabase functions deploy --project-ref "$PROD_REF"; then
              echo "::endgroup::"; exit 0
            fi
            echo "::endgroup::"
            echo "::warning::functions deploy attempt $attempt failed (likely transient esm.sh); retrying…"
            sleep 15
          done
          echo "::error::functions deploy failed after 3 attempts"; exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (EAS needs node_modules to resolve config plugins)
        if: ${{ env.EXPO_TOKEN != '' }}
        run: npm ci

      - name: Trigger EAS production build
        if: ${{ env.EXPO_TOKEN != '' }}
        run: npx eas-cli@latest build --platform ios --profile production --non-interactive --no-wait

      - name: Skip EAS (no token)
        if: ${{ env.EXPO_TOKEN == '' }}
        run: echo "::warning::EXPO_TOKEN not set — skipped EAS production build."

      - name: Tag release
        id: tag
        run: |
          VERSION="v$(node -p "require('./package.json').version")-prod.${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Production deploy $VERSION (${{ github.sha }})"
          git push origin "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Slack — deploy succeeded
        if: ${{ success() && env.SLACK_WEBHOOK_URL != '' }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -X POST -H 'Content-Type: application/json' "$SLACK_WEBHOOK_URL" -d @- <<JSON
          {"text":":white_check_mark: *Production deploy succeeded* — \`${{ steps.tag.outputs.version }}\`","attachments":[{"color":"#2eb886","blocks":[
            {"type":"section","fields":[
              {"type":"mrkdwn","text":"*Env:*\nproduction"},
              {"type":"mrkdwn","text":"*Release:*\n\`${{ steps.tag.outputs.version }}\`"},
              {"type":"mrkdwn","text":"*Commit:*\n\`${{ github.sha }}\`"},
              {"type":"mrkdwn","text":"*By:*\n${{ github.actor }}"},
              {"type":"mrkdwn","text":"*Shipped:*\nmigrations + edge functions + EAS"}
            ]},
            {"type":"actions","elements":[{"type":"button","text":{"type":"plain_text","text":"View run"},"url":"$RUN_URL"}]}
          ]}]}
          JSON

  notify-failure:
    name: Slack on failure
    needs: [test, deploy]
    if: ${{ always() && (needs.test.result == 'failure' || needs.deploy.result == 'failure') }}
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_ALERT_MENTION: ${{ secrets.SLACK_ALERT_MENTION }}
    steps:
      - name: Slack — deploy failed
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STAGE="${{ needs.test.result == 'failure' && 'tests' || 'deploy' }}"
          curl -sf -X POST -H 'Content-Type: application/json' "$SLACK_WEBHOOK_URL" -d @- <<JSON
          {"text":":rotating_light: *PRODUCTION deploy FAILED* at ${STAGE} ${SLACK_ALERT_MENTION}","attachments":[{"color":"#cc0000","blocks":[
            {"type":"section","fields":[
              {"type":"mrkdwn","text":"*Env:*\nproduction"},
              {"type":"mrkdwn","text":"*Failed at:*\n${STAGE}"},
              {"type":"mrkdwn","text":"*Commit:*\n\`${{ github.sha }}\`"}
            ]},
            {"type":"section","text":{"type":"mrkdwn","text":"Migrations are not auto-rolled-back. Follow the rollback runbook in docs/chief_engineer/deployment.md immediately."}},
            {"type":"actions","elements":[{"type":"button","text":{"type":"plain_text","text":"View logs"},"url":"$RUN_URL"}]}
          ]}]}
          JSON
