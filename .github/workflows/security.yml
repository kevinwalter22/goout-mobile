name: Security

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit (high + critical)
        run: npm audit --audit-level=high

  secrets-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-tests:
    name: Security regression tests
    runs-on: ubuntu-latest
    # Only run when the required secrets are configured
    if: ${{ secrets.SUPABASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run security regression suite
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          USER_A_EMAIL: ${{ secrets.USER_A_EMAIL }}
          USER_A_PASSWORD: ${{ secrets.USER_A_PASSWORD }}
          USER_B_EMAIL: ${{ secrets.USER_B_EMAIL }}
          USER_B_PASSWORD: ${{ secrets.USER_B_PASSWORD }}
        run: npm run security:test
